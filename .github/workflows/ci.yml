name: SwagStore CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: |
          find . -name "*.js" \
            ! -path "./node_modules/*" \
            ! -path "./coverage/*" \
            -exec node --check {} \;

  test:
    name: Jest coverage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit and integration tests
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build artifact
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Verify app boots
        run: |
          timeout 8 node -e "
            const createApp = require('./app');
            const app = createApp();
            const server = app.listen(0, () => {
              console.log('App started on port', server.address().port);
              server.close(() => process.exit(0));
            });
          "

      - name: Create release archive
        run: |
          mkdir -p dist
          zip -r dist/swagstore.zip . \
            --exclude "node_modules/*" \
            --exclude ".git/*" \
            --exclude "coverage/*" \
            --exclude "dist/*" \
            --exclude "*.bak"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: swagstore-build-${{ github.sha }}
          path: dist/swagstore.zip
          retention-days: 14

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render deploy
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Deploy to Railway
        if: env.RENDER_DEPLOY_HOOK_URL == '' && env.RAILWAY_TOKEN != ''
        run: npx @railway/cli up --service swagstore

      - name: Skip deploy when no secret is configured
        if: env.RENDER_DEPLOY_HOOK_URL == '' && env.RAILWAY_TOKEN == ''
        run: |
          echo "Build artifact is ready."
          echo "Set RENDER_DEPLOY_HOOK_URL or RAILWAY_TOKEN to enable automatic deploy."
